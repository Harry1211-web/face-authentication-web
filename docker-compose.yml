services:
  backend:
    build: ./backend
    environment:
      PORT: 5000
      JWT_SECRET: change_me_in_production
      FRONTEND_ORIGIN: http://localhost
      DATABASE_URL: postgresql://user:password@host/db?sslmode=require
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
